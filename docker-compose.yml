services:
  postgres:
    image: postgres:16-alpine
    container_name: techsouls-command-center-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: techsouls
      POSTGRES_PASSWORD: techsouls
      POSTGRES_DB: techsouls_command_center
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techsouls -d techsouls_command_center"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: techsouls-command-center-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
